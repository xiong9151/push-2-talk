name: Release Pipeline

on:
  push:
    branches:
      - main        # 监听 main 分支的普通提交（只测试构建）
    tags:
      - 'v*'        # 监听打标签（执行发布）
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write

jobs:
  # ========================================================
  # Job 1: 构建测试 (Build Test)
  # 场景: 只是 Push 代码到 main 分支，没有打 Tag
  # 目的: 确保代码能编译通过，但不消耗版本号，不发布
  # ========================================================
  test-build:
    # 如果不是 Tag，且不是手动触发，则运行测试
    if: startsWith(github.ref, 'refs/tags/') != true
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build only (No Release)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: 
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
        run: npm run tauri build

  # ========================================================
  # Job 2: 正式发布 (Release)
  # 场景: 推送了 v* 标签
  # 目的: 生成更新日志、签名、打包、上传 Release
  # ========================================================
  release:
    # 只有当推送的是 Tag 时才运行
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          # 获取当前 tag
          CURRENT_TAG=${GITHUB_REF#refs/tags/}
          echo "Current tag: $CURRENT_TAG"

          # 获取上一个 tag
          PREV_TAG=$(git describe --tags --abbrev=0 ${CURRENT_TAG}^ 2>/dev/null || echo "")
          echo "Previous tag: $PREV_TAG"

          # 获取 commit 列表
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s" -50)
          else
            COMMITS=$(git log ${PREV_TAG}..${CURRENT_TAG} --pretty=format:"%s")
          fi

          # 分类 commits
          FEATURES=""
          FIXES=""
          UPDATES=""
          OTHERS=""

          while IFS= read -r line; do
            [ -z "$line" ] && continue

            if echo "$line" | grep -qiE "^feat[：:]"; then
              FEATURES="${FEATURES}- ${line#*[：:]}"$'\n'
            elif echo "$line" | grep -qiE "^(fix|bugfix|bug)[：:]"; then
              FIXES="${FIXES}- ${line#*[：:]}"$'\n'
            elif echo "$line" | grep -qiE "^(update|improve|perf|优化)[：:]"; then
              UPDATES="${UPDATES}- ${line#*[：:]}"$'\n'
            elif echo "$line" | grep -qiE "^(chore|docs|refactor|style|test|security)[：:]"; then
              OTHERS="${OTHERS}- ${line#*[：:]}"$'\n'
            else
              OTHERS="${OTHERS}- ${line}"$'\n'
            fi
          done <<< "$COMMITS"

          # 构建 changelog
          CHANGELOG=""

          if [ -n "$FEATURES" ]; then
            CHANGELOG="${CHANGELOG}## ✨ 新功能"$'\n'"${FEATURES}"$'\n'
          fi

          if [ -n "$FIXES" ]; then
            CHANGELOG="${CHANGELOG}## 🐛 Bug 修复"$'\n'"${FIXES}"$'\n'
          fi

          if [ -n "$UPDATES" ]; then
            CHANGELOG="${CHANGELOG}## 🚀 优化改进"$'\n'"${UPDATES}"$'\n'
          fi

          if [ -n "$OTHERS" ]; then
            CHANGELOG="${CHANGELOG}## 📦 其他"$'\n'"${OTHERS}"$'\n'
          fi

          # 如果没有任何分类的 commits
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="本次更新无重大变更"$'\n'
          fi

          # 输出到 GitHub Actions
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: 
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
        with:
          tagName: v__VERSION__
          releaseName: 'v__VERSION__'
          releaseBody: |
            ${{ steps.changelog.outputs.changelog }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
